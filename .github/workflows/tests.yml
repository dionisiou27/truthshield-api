name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # openai + beautifulsoup4 are needed so the ai_engine generation-path
          # tests run (not skipped) — both are core project dependencies.
          pip install pytest pydantic numpy pyyaml httpx fastapi python-dotenv pydantic-settings openai beautifulsoup4

      # Integration tests (tests/integration/) are intentionally excluded:
      # they require live API keys and network access.
      - name: Run ML pipeline tests
        run: python -m pytest tests/test_ml_pipeline.py -q

      - name: Run reward poisoning / drift test
        run: python bench/test_reward_poisoning.py
